[pytest]
pythonpath = .
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --disable-warnings
    --tb=short
    -ra
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    unit: unit tests
    integration: integration tests
    slow: slow tests
filterwarnings =
    ignore::DeprecationWarning
